<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Formula Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Top lapis-lazuli strip */
  .lapis-strip {
  width: 100%;
  background-image: url('ss.jpg'); /* keep your uploaded image */
  background-size: 100% auto;      /* full width, height adjusts automatically */
  background-repeat: no-repeat;
  background-position: center;
  position: relative;
}

/* Heading text with white color and thin blue outline */
.site-heading {
  position: absolute;
  top: 0;
  left: 20px;
  font-size: 24px;
  font-weight: bold;
  line-height: normal;           /* no fixed height; aligns naturally */
  color: white;                  /* white text */
  -webkit-text-stroke: 1px #4169E1; /* thin royal blue outline */
  text-stroke: 1px #4169E1;         /* fallback */
}



    /* Site heading text on top-left */
    .site-heading {
      position: absolute;
      top: 0;
      left: 20px;
      color: black;             /* heading text color */
      font-size: 24px;
      font-weight: bold;
      line-height: 50px;        /* vertically center in the strip */
    }
  </style>
</head>
<body class="bg-white flex flex-col items-center min-h-screen">

  <!-- Top lapis-lazuli strip -->
  <div class="lapis-strip">
    <div class="site-heading">Site Heading</div>
  </div>

  <!-- Main content: buttons -->
  <main class="flex flex-col items-center justify-center mt-20 space-y-8">
    <a href="basic.html" target="_blank">
      <button class="px-10 py-4 bg-blue-600 hover:bg-blue-500 text-white text-2xl rounded-2xl shadow-lg transition transform hover:-translate-y-0.5">
        Basic
      </button>
    </a>
    <a href="advanced.html" target="_blank">
      <button class="px-10 py-4 bg-indigo-600 hover:bg-indigo-500 text-white text-2xl rounded-2xl shadow-lg transition transform hover:-translate-y-0.5">
        Advanced
      </button>
    </a>
  </main>

</body>
</html>
